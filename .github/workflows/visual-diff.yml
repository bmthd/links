name: Visual Diff
on:
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "scripts/**"
      - "panda.config.ts"
      - "waku.config.ts"
      - "postcss.config.cjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/visual-diff.yml"
      - ".github/visual-diff/**"
jobs:
  visual-diff:
    name: Visual Diff
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Install visual-diff dependencies
        run: npm install
        working-directory: .github/visual-diff
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
        working-directory: .github/visual-diff
      - name: Capture and compare screenshots
        run: node .github/visual-diff/run.ts
        env:
          PROD_URL: https://links.bmth.dev/
      - name: Upload screenshots
        id: artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: visual-diff
          path: .github/visual-diff/output
      - name: Comment diff summary on PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          ARTIFACT_URL: ${{ steps.artifact.outputs.artifact-url }}
        with:
          script: |
            const { readFileSync } = require('node:fs');
            const marker = '<!-- visual-diff-report -->';
            const results = JSON.parse(
              readFileSync('.github/visual-diff/output/results.json', 'utf8'),
            );
            const rows = Object.entries(results)
              .map(([theme, r]) => {
                const pct = (r.ratio * 100).toFixed(2);
                return `| ${theme} | ${pct}% | ${r.diffPixels.toLocaleString()} / ${r.totalPixels.toLocaleString()} px |`;
              })
              .join('\n');
            const body = [
              marker,
              '## 📸 Visual Diff (本番 vs この PR)',
              '',
              '| テーマ | 差分率 | 差分ピクセル |',
              '| --- | --- | --- |',
              rows,
              '',
              `スクリーンショット (PR / 本番 / diff、375px幅・dark/light): [artifact をダウンロード](${process.env.ARTIFACT_URL})`,
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
